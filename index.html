
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>应天杯 · 萨卡兹的无终奇语 · Ban & Pick</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --crimson:#8B1A1A;--crimson-deep:#4A0808;--crimson-light:#CC3333;
  --gold:#D4A854;--gold-light:#F0DFA0;--gold-bright:#FFE88A;
  --bg-dark:#1A0D0D;--bg-panel:rgba(20,10,10,0.92);
  --text:#E8DDD0;--text-dim:#A09080;--text-bright:#FFF5E8;
  --ta-color:#FF5522;--ta-glow:rgba(255,85,34,0.3);
  --tb-color:#2288FF;--tb-glow:rgba(34,136,255,0.3);
  --ban-color:#FF3B3B;--ban-bg:rgba(255,59,59,0.15);
  --pick-a-bg:rgba(255,85,34,0.15);--pick-b-bg:rgba(34,136,255,0.15);
  --radius:6px;--border-subtle:rgba(139,26,26,0.3);--border-bright:rgba(212,168,84,0.35);
}
html,body{height:100%;font-family:'Segoe UI','Microsoft YaHei','PingFang SC','Noto Sans SC',sans-serif;background:var(--bg-dark);color:var(--text);user-select:none;overflow:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60%40% at 50%15%,rgba(180,40,40,0.10)0%,transparent 60%),radial-gradient(ellipse 50%50% at 80%75%,rgba(160,50,20,0.05)0%,transparent 55%),radial-gradient(ellipse 40%45% at 15%70%,rgba(120,20,20,0.06)0%,transparent 50%),linear-gradient(170deg,#120808,#1A0D0D 25%,#221010 50%,#1A0A0A 75%,#0E0606)}
#bg-pattern{position:fixed;inset:0;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg width='60' height='52' viewBox='0 0 60 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l25.98 15v30L30 60 4.02 45V15z' fill='none' stroke='%23D4A854' stroke-width='.5'/%3E%3C/svg%3E");background-size:52px 45px;pointer-events:none}
#particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1}
.p{position:absolute;width:2px;height:2px;background:var(--gold);border-radius:50%;opacity:0;animation:drift linear infinite}
@keyframes drift{0%{transform:translateY(100vh)scale(0);opacity:0}8%{opacity:.35}92%{opacity:.12}100%{transform:translateY(-5vh)scale(1);opacity:0}}
#app{position:relative;z-index:10;height:100%;display:flex;flex-direction:column;overflow:hidden}
#hero{position:relative;flex-shrink:0;height:28vh;min-height:130px;max-height:220px;overflow:hidden;background:linear-gradient(135deg,#1A0808,#2A1010)}
#hero-img{width:100%;height:100%;object-fit:cover;object-position:center 30%;display:block}
#hero-img.hide{display:none}#hero-fallback{display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:15px;color:var(--text-dim);background:linear-gradient(135deg,#1A0808,#2A1010)}#hero-fallback.show{display:flex}
#hero-overlay{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1)0%,rgba(0,0,0,.35)50%,rgba(10,4,4,.92)100%);pointer-events:none}
#hero-title{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);text-align:center;pointer-events:none;z-index:3;width:92%;max-width:750px}
#hero-title .mt{font-size:44px;font-weight:900;letter-spacing:10px;background:linear-gradient(135deg,#FFE88A 0%,#D4A854 30%,#CC3333 60%,#D4A854 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-shadow:0 0 60px rgba(204,51,51,0.2);line-height:1.2}
#hero-title .st{font-size:13px;color:var(--text);letter-spacing:2px;margin-top:1px;text-shadow:0 2px 8px rgba(0,0,0,.85);opacity:.85}
#hero-title .st em{font-style:normal;color:var(--gold-bright);font-weight:700}
.hero-acts{position:absolute;top:6px;right:6px;z-index:5;display:flex;gap:3px}
.hero-btn{padding:3px 9px;border:1px solid rgba(255,255,255,.12);border-radius:4px;background:rgba(0,0,0,0.5);color:var(--text-dim);font-size:10px;cursor:pointer;transition:all .25s;backdrop-filter:blur(4px)}
.hero-btn:hover{border-color:var(--gold);color:var(--text)}
#hero-url-inp{display:none;position:absolute;top:32px;right:6px;z-index:6;width:260px;padding:4px 8px;border:1px solid var(--gold);border-radius:4px;background:rgba(0,0,0,.9);color:var(--text);font-size:11px;outline:none}
#hero-file-inp{display:none}
#top-bar{display:flex;align-items:center;gap:10px;flex-shrink:0;padding:4px 14px;background:rgba(10,4,4,.5);border-bottom:1px solid var(--border-subtle);flex-wrap:wrap;justify-content:center}
.tb-item{display:flex;align-items:center;gap:4px;color:var(--text-dim);white-space:nowrap;font-size:12px}
.tb-item .lbl{font-size:10px;color:var(--text-dim)}
.tb-item input,.tb-item select{background:rgba(0,0,0,.35);border:1px solid var(--border-subtle);border-radius:3px;font-size:11px;padding:1px 5px;text-align:center;font-weight:700;color:var(--gold)}
.tb-item select{cursor:pointer;color:var(--text)}.tb-item select option{background:#1A0A0A;color:var(--text)}
.tb-item input:focus{outline:none;border-color:var(--gold)}.tb-div{width:1px;height:20px;background:var(--border-subtle);flex-shrink:0}
.main{display:flex;gap:8px;flex:1;min-height:0;padding:5px 8px 8px}
.team-panel{width:300px;flex-shrink:0;background:var(--bg-panel);border:2px solid var(--border-subtle);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(6px);max-height:calc(100vh - 260px)}
.team-panel.ta{border-color:rgba(255,85,34,.35)}.team-panel.tb{border-color:rgba(34,136,255,.35)}
.tp-head{display:flex;align-items:center;gap:10px;padding:12px 10px 8px;border-bottom:1px solid var(--border-subtle);flex-shrink:0}
.ta .tp-head{background:linear-gradient(90deg,rgba(255,85,34,.08),transparent)}
.tb .tp-head{background:linear-gradient(90deg,rgba(34,136,255,.08),transparent)}
.tp-avatar{width:64px;height:64px;border-radius:50%;border:2px solid var(--border-bright);overflow:hidden;flex-shrink:0;position:relative;cursor:pointer;background:rgba(0,0,0,.4)}
.tp-avatar img{width:100%;height:100%;object-fit:cover}.tp-avatar:hover .ah{opacity:1!important}
.tp-pl-av{width:28px;height:28px;border-radius:50%;border:1px solid var(--border-bright);overflow:hidden;flex-shrink:0;position:relative;cursor:pointer;background:rgba(0,0,0,.4);display:inline-block;vertical-align:middle;margin-right:4px}
.tp-pl-av img{width:100%;height:100%;object-fit:cover}
.tp-pl-av .ah{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-dim);opacity:0;transition:.2s;background:rgba(0,0,0,.4);border-radius:50%}
.tp-pl-av:hover .ah{opacity:1!important}
.tp-info{flex:1;min-width:0}
.tp-player{font-size:24px;font-weight:700;color:var(--text);line-height:1.4}
.tp-player .lbl{font-size:12px;color:var(--text-dim);font-weight:400;margin-right:2px;vertical-align:middle}
.tp-name{font-size:17px;font-weight:600;margin-top:2px;opacity:.9}
.ta .tp-name{color:var(--ta-color)}.tb .tp-name{color:var(--tb-color)}
.tp-body{flex:1;overflow-y:auto;padding:3px 5px;display:flex;flex-direction:column;gap:1px;--pick-s:68px;--pick-h:56px}
.tp-body::-webkit-scrollbar{width:4px}
.tp-body::-webkit-scrollbar-thumb{background:rgba(107,15,15,.25);border-radius:2px}
.tp-stitle{font-size:11px;font-weight:700;color:var(--text);letter-spacing:1px;margin-bottom:2px;display:flex;justify-content:space-between;align-items:center;padding:0 2px}
.tp-stitle .badge{font-size:10px;padding:0 8px;border-radius:4px;background:rgba(139,26,26,.2);color:var(--text-dim)}
.tp-stitle .badge.bb{background:rgba(255,59,59,.12);color:var(--ban-color)}
.tp-stitle .badge.pa{background:rgba(255,85,34,.12);color:var(--ta-color)}
.tp-stitle .badge.pb{background:rgba(34,136,255,.12);color:var(--tb-color)}
.tp-divider{height:1px;margin:2px 4px;background:linear-gradient(90deg,transparent,rgba(139,26,26,.06),transparent)}
.tp-pool{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;min-height:18px;padding:1px 2px}
.tp-pool .slot{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;border:2px solid var(--border-subtle);background:rgba(30,12,12,.5);padding:0;transition:all .2s;cursor:default}
.tp-pool .slot img{width:100%;height:100%;object-fit:cover;object-position:center 30%;border-radius:4px;display:block}
.tp-pool .slot.ban{border-color:var(--ban-color);background:var(--ban-bg);box-shadow:0 0 8px rgba(255,59,59,.12)}
.tp-pool .slot.pa{border-color:var(--ta-color);background:var(--pick-a-bg);box-shadow:0 0 8px rgba(255,85,34,.1)}
.tp-pool .slot.pb{border-color:var(--tb-color);background:var(--pick-b-bg);box-shadow:0 0 8px rgba(34,136,255,.1)}
.tp-pool .slot.empty{aspect-ratio:1;border-style:dashed;opacity:.12;justify-content:center;height:auto}
.tp-body.sp .tp-pool .slot{aspect-ratio:unset;height:var(--pool-h)}
.tp-body.sp .tp-pool .slot.empty{aspect-ratio:unset;height:var(--pool-h)}
/* ---- Pick列表样式（一人一行+名称） ---- */
.pick-pool{display:flex;flex-direction:column;gap:2px;min-height:18px;padding:1px 2px}
.pick-pool .slot{display:flex;align-items:center;gap:10px;border-radius:6px;padding:3px 8px;position:relative;overflow:hidden;border:2px solid var(--border-subtle);background:rgba(30,12,12,.5);min-height:var(--pick-h,50px);transition:all .2s;cursor:default;aspect-ratio:auto}
.pick-pool .slot img{width:var(--pick-s,56px);height:var(--pick-s,56px);object-fit:cover;object-position:center 30%;border-radius:4px;display:block;flex-shrink:0}
.pick-pool .slot .sname{font-size:13px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;font-weight:500;line-height:1.3}
.pick-pool .slot.empty{border-style:dashed;opacity:.12;min-height:var(--pick-h,36px);aspect-ratio:auto;justify-content:center}
.tp-footer{flex-shrink:0;padding:4px 6px;border-top:1px solid var(--border-subtle);display:flex;flex-direction:column;gap:2px}
.tp-fin-row{display:flex;align-items:center;justify-content:space-between;font-size:11px}
.tp-fin-row .lbl{color:var(--text-dim);font-size:10px}
.tp-fin-row input{width:50px;background:rgba(0,0,0,.35);border:1px solid var(--border-subtle);border-radius:3px;color:var(--gold);font-size:11px;padding:1px 4px;text-align:center;font-weight:700}
.tp-fin-row input:focus{outline:none;border-color:var(--gold)}
.tp-balance{display:flex;align-items:center;justify-content:space-between;padding:2px 0}
.tp-balance .lbl{font-size:12px;color:var(--text-dim);font-weight:600}
.tp-balance .val{font-size:22px;font-weight:900;color:#55DD88;text-shadow:0 0 12px rgba(85,221,136,.25)}
.tp-restart{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tp-restart .lbl{font-size:10px;color:var(--text-dim)}
.tp-restart input{width:36px;background:rgba(0,0,0,.35);border:1px solid var(--border-subtle);border-radius:3px;color:var(--gold);font-size:11px;padding:1px 3px;text-align:center;font-weight:700}
.tp-restart input:disabled{opacity:.3;cursor:not-allowed}
.switch{position:relative;display:inline-block;width:32px;height:18px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.sl{position:absolute;cursor:pointer;inset:0;background:rgba(60,30,30,.5);border-radius:9px;transition:.3s;border:1px solid var(--border-subtle)}
.sl::before{content:'';position:absolute;height:12px;width:12px;left:2px;bottom:2px;background:#666;border-radius:50%;transition:.3s}
.switch input:checked+.sl{background:rgba(139,26,26,.5);border-color:var(--crimson-light)}
.switch input:checked+.sl::before{transform:translateX(14px);background:var(--crimson-light)}
.grid-wrap{flex:1;min-width:0;background:var(--bg-panel);border:2px solid var(--border-subtle);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(6px)}
.grid-hd{display:flex;align-items:center;justify-content:space-between;padding:4px 10px;flex-shrink:0;border-bottom:1px solid rgba(139,26,26,.06)}
.grid-hd .gt{font-size:13px;font-weight:700;color:var(--text);letter-spacing:1px}.grid-hd .gt span{color:var(--gold)}
.grid-hd .gd{font-size:11px;color:var(--text-dim)}.grid-hd .gd em{font-style:normal;color:var(--gold);font-weight:700}
.grid-tabs{display:flex;gap:2px;padding:3px 8px;flex-shrink:0;border-bottom:1px solid rgba(139,26,26,.04);overflow-x:auto}
.grid-tabs::-webkit-scrollbar{height:3px}.grid-tabs::-webkit-scrollbar-thumb{background:rgba(107,15,15,.2);border-radius:2px}
.clstab{padding:4px 12px;font-size:11px;border-radius:4px;cursor:pointer;border:1px solid transparent;color:var(--text-dim);background:transparent;transition:all .2s;white-space:nowrap}
.clstab:hover{border-color:rgba(212,168,84,.18)}.clstab.on{border-color:var(--gold);color:var(--gold-bright);background:rgba(212,168,84,.07)}
.pubban-row{display:flex;align-items:center;gap:6px;padding:4px 10px;flex-shrink:0;border-bottom:1px solid rgba(212,168,84,.12);background:rgba(212,168,84,.03)}
.pubban-hd{font-size:11px;font-weight:700;color:var(--gold-bright);white-space:nowrap;letter-spacing:1px}
.pubban-ops{display:flex;gap:4px;flex-wrap:wrap;flex:1}
.pubban-ops .pbslot{width:38px;height:38px;border-radius:4px;overflow:hidden;border:1px solid rgba(212,168,84,.25);position:relative;cursor:pointer;transition:all .2s;flex-shrink:0}
.pubban-ops .pbslot:hover{border-color:var(--ban-color);box-shadow:0 0 6px rgba(255,59,59,.2)}
.pubban-ops .pbslot img{width:100%;height:100%;object-fit:cover;display:block}
.pubban-ops .pbslot .pbdel{position:absolute;top:0;right:0;font-size:10px;color:var(--ban-color);background:rgba(0,0,0,.7);border-radius:0 3px;padding:1px 3px;display:none;line-height:1}
.pubban-ops .pbslot:hover .pbdel{display:block}
.grid-scroll{flex:1;overflow-y:auto;min-height:0;padding:5px 8px}
.grid-scroll::-webkit-scrollbar{width:6px}
.grid-scroll::-webkit-scrollbar-track{background:rgba(0,0,0,.06)}
.grid-scroll::-webkit-scrollbar-thumb{background:rgba(139,26,26,.25);border-radius:3px}
.op-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:5px}
.op-card{aspect-ratio:3/4;border-radius:5px;border:2px solid var(--border-subtle);background:rgba(30,12,12,.45);cursor:pointer;position:relative;overflow:hidden;transition:all .2s;display:flex;align-items:center;justify-content:center}
.op-card:hover{border-color:var(--gold);box-shadow:0 0 14px rgba(212,168,84,.1);transform:translateY(-2px);z-index:3}
.op-card img{width:100%;height:100%;object-fit:cover;transition:all .4s}
.op-card:hover img{transform:scale(1.06)}
.op-card .plh-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:var(--gold-dim);background:linear-gradient(135deg,rgba(139,26,26,.1),rgba(30,12,12,.4));z-index:0;pointer-events:none;transition:opacity .4s}
.op-card .plh-bg.hide{opacity:0}
.op-card .oname{position:absolute;bottom:0;left:0;right:0;font-size:9px;text-align:center;padding:2px 1px;background:rgba(0,0,0,.82);color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;z-index:2}
.op-card .oclass{position:absolute;top:2px;left:3px;font-size:12px;opacity:.7;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.8);z-index:2}
.op-card.banned{opacity:.18;border-color:var(--ban-color);cursor:not-allowed;pointer-events:none}
.op-card.banned::after{content:'✕';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:var(--ban-color);font-weight:900;text-shadow:0 0 20px rgba(255,59,59,.4);pointer-events:none;z-index:5}
.op-card.picked-a,.op-card.guest-a{border-color:var(--ta-color);cursor:not-allowed;pointer-events:none}
.op-card.picked-a::after{content:'';position:absolute;inset:0;background:rgba(255,85,34,.10);pointer-events:none;z-index:1}
.op-card.picked-b,.op-card.guest-b{border-color:var(--tb-color);cursor:not-allowed;pointer-events:none}
.op-card.picked-b::after{content:'';position:absolute;inset:0;background:rgba(34,136,255,.10);pointer-events:none;z-index:1}
.op-card.guest-a{opacity:.65}.op-card.guest-a::after{content:'🔄';position:absolute;bottom:22px;right:2px;font-size:14px;z-index:5}
.op-card.guest-b{opacity:.65}.op-card.guest-b::after{content:'🔄';position:absolute;bottom:22px;right:2px;font-size:14px;z-index:5}
#bottom-bar{display:flex;align-items:center;gap:8px;flex-shrink:0;padding:6px 12px;background:rgba(10,4,4,.6);border-top:2px solid var(--border-subtle);flex-wrap:wrap;justify-content:center;position:sticky;bottom:0;z-index:20}
.bb-section{display:flex;align-items:center;gap:6px}.bb-div{width:1px;height:22px;background:var(--border-subtle)}
.bb-label{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:3px;font-weight:600}
.bb-label .dot{width:12px;height:12px;border-radius:50%}
.bb-label .dot.ra{background:var(--ta-color);box-shadow:0 0 6px var(--ta-color)}
.bb-label .dot.rb{background:var(--tb-color);box-shadow:0 0 6px var(--tb-color)}
.abtn{padding:5px 14px;border:2px solid var(--border-subtle);border-radius:5px;background:rgba(10,4,4,.7);color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .2s;letter-spacing:1px;font-weight:600}
.abtn:hover{border-color:var(--gold);color:var(--text);background:rgba(212,168,84,.06)}
.abtn.cur-a{border-color:var(--ta-color);color:var(--ta-color);background:rgba(255,85,34,.12);box-shadow:0 0 8px rgba(255,85,34,.15)}
.abtn.cur-b{border-color:var(--tb-color);color:var(--tb-color);background:rgba(34,136,255,.12);box-shadow:0 0 8px rgba(34,136,255,.15)}
.abtn.cur-ban{border-color:var(--ban-color)!important;color:var(--ban-color)!important;background:rgba(255,59,59,.08)!important;box-shadow:0 0 8px rgba(255,59,59,.12)!important}
.abtn.cur-guest-a,.abtn.cur-guest-b{border-color:var(--gold-bright)!important;color:var(--gold-bright)!important;background:rgba(212,168,84,.12)!important}
.abtn-sm{padding:4px 10px;font-size:11px}
.phase-info{padding:3px 12px;border:1px solid var(--border-subtle);border-radius:5px;font-size:12px;white-space:nowrap;background:rgba(0,0,0,.3);font-weight:600;color:var(--text)}
.phase-info .hl{font-weight:800}
.phase-info .hl.ta{color:var(--ta-color)}.phase-info .hl.tb{color:var(--tb-color)}
.phase-info .hl.ban{color:var(--ban-color)}.phase-info .hl.pick{color:#55DD88}.phase-info .hl.guest{color:var(--gold-bright)}
.bgm-group{display:flex;align-items:center;gap:2px;background:rgba(0,0,0,.3);border:1px solid var(--border-subtle);border-radius:4px;padding:1px}
.bgm-btn{padding:3px 6px;border:none;background:transparent;color:var(--text-dim);font-size:10px;cursor:pointer;transition:all .2s}
.bgm-btn:hover{color:var(--text)}.bgm-btn.on{color:#55DD88}
.bgm-btn.up{color:var(--gold)}.bgm-btn.up:hover{color:var(--gold-bright)}
.bgm-vol{width:50px;height:3px;cursor:pointer;accent-color:var(--gold);background:var(--border-subtle);border-radius:2px;margin:0 2px}
#bgm-file{display:none}
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal-box{background:#1A0A0A;border:2px solid var(--gold);border-radius:12px;padding:20px 26px;max-width:400px;width:92%;box-shadow:0 0 80px rgba(139,26,26,.2)}
.modal-box h2{font-size:18px;color:var(--gold-bright);text-align:center;margin-bottom:12px;letter-spacing:2px}
.mf{margin-bottom:8px}.mf label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:2px}
.mf input{width:100%;padding:6px 10px;background:rgba(0,0,0,.4);border:1px solid var(--border-subtle);border-radius:4px;color:var(--text);font-size:12px}
.mf input:focus{outline:none;border-color:var(--gold)}
.mf-row{display:flex;gap:10px}
.m-acts{display:flex;gap:10px;justify-content:center;margin-top:12px}
.m-acts button{padding:6px 22px;border-radius:5px;cursor:pointer;font-size:12px;transition:all .25s;font-weight:600}
.m-conf{background:linear-gradient(135deg,#8B1A1A,#4A0808);border:2px solid var(--gold);color:var(--text)}
.m-conf:hover{box-shadow:0 0 20px rgba(212,168,84,.15)}
.m-cancel{background:transparent;border:1px solid var(--border-subtle);color:var(--text-dim)}
.m-cancel:hover{border-color:var(--text-dim)}
.toast{position:fixed;top:-50px;left:50%;transform:translateX(-50%);z-index:200;padding:7px 20px;border-radius:6px;font-size:12px;letter-spacing:1px;background:rgba(16,6,6,.95);border:2px solid var(--gold);color:var(--text);transition:top .4s cubic-bezier(.34,1.56,.64,1);pointer-events:none;backdrop-filter:blur(12px);white-space:nowrap;font-weight:600}
.toast.sh{top:16px}.toast.t-ban{border-color:var(--ban-color)}.toast.t-pa{border-color:var(--ta-color)}.toast.t-pb{border-color:var(--tb-color)}
.cfrm-bg{display:none;position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.65);align-items:center;justify-content:center}
.cfrm-bg.open{display:flex}
.cfrm-box{background:#1A0A0A;border:2px solid var(--gold);border-radius:10px;padding:18px 22px;max-width:340px;width:90%;text-align:center}
.cfrm-box p{font-size:13px;color:var(--text);margin-bottom:12px;line-height:1.5}
.cfrm-acts{display:flex;gap:10px;justify-content:center}
.cfrm-acts button{padding:6px 20px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .2s;font-weight:600}
.cfrm-y{background:var(--crimson);border:1px solid var(--gold);color:var(--text)}
.cfrm-y:hover{box-shadow:0 0 10px rgba(212,168,84,.15)}
.cfrm-n{background:transparent;border:1px solid var(--border-subtle);color:var(--text-dim)}
.cfrm-n:hover{border-color:var(--text-dim)}
@media(max-width:1100px){
  .team-panel{width:240px}#hero-title .mt{font-size:32px;letter-spacing:6px}
  .op-grid{grid-template-columns:repeat(auto-fill,minmax(74px,1fr))}
}
@media(max-width:800px){
  .main{flex-direction:column;padding:4px 5px;gap:3px}
  .team-panel{width:100%;max-height:none}
  #hero{height:28vh;min-height:140px;max-height:220px}
  #hero-title .mt{font-size:26px;letter-spacing:4px}#hero-title .st{font-size:11px}
  .op-grid{grid-template-columns:repeat(auto-fill,minmax(66px,1fr))}
}
</style>

function renderUI(){

  if(!S._lastAct){S._lastAct=S.curAct;if(S.cdRemain===undefined)S.cdRemain=S.countdown}
  else if(S.curAct!==S._lastAct){S._lastAct=S.curAct;if(!S.cdPaused){S.cdRemain=S.countdown}}

  document.querySelectorAll('.op-card').forEach(function(card){

// BP栏自适应缩放：线性比例缩小，网格+选取池都参与；允许缩到很小
function fitPools(){
  document.querySelectorAll('.team-panel').forEach(function(p){
    var b=p.querySelector('.tp-body');if(!b)return;
    b.style.removeProperty('--pick-s');b.style.removeProperty('--pick-h');b.style.removeProperty('--pool-h');
    b.classList.remove('sp');
    if(!b.querySelector('.slot:not(.empty)'))return;
    requestAnimationFrame(function(){
      if(b.scrollHeight<=b.clientHeight)return;
      // 少于5个不缩（4个以内都能放下）
      var pkn=b.querySelectorAll('.pick-pool .slot:not(.empty)').length;
      var gpn=b.querySelectorAll('.tp-pool:not(.pick-pool) .slot:not(.empty)').length;
      if(pkn<=4&&gpn<=4)return;
      // 第一遍：基于原始内容高度计算比例
      var oh=b.scrollHeight,ratio=Math.max(0.06,(b.clientHeight-8)/oh);
      function ap(f){
        var pk=b.querySelector('.pick-pool');
        if(pk&&pk.querySelector('.slot:not(.empty)')){
          b.style.setProperty('--pick-s',Math.max(8,Math.floor(56*f))+'px');
          b.style.setProperty('--pick-h',Math.max(8,Math.floor(56*f))+'px');
        }
        if(b.querySelector('.tp-pool .slot:not(.empty)')){
          b.classList.add('sp');
          b.style.setProperty('--pool-h',Math.max(6,Math.floor(70*f))+'px');
        }
        requestAnimationFrame(function(){
          if(b.scrollHeight>b.clientHeight&&f>0.06)ap(Math.max(0.06,f-0.03))
        });
      }
      ap(ratio);
    });
  });
}

function loadState(){

    if(d._v!==SAVE_VER){localStorage.removeItem('ytb_bp');return false}
    // 必须先初始化干员列表，因为loadState成功后不会走init()
    S.ops=OPERATORS.map(function(o){o=Object.assign({},o);o.status='avail';return o});
    ['teamA','teamB','maxBan','maxPick','maxGuest','bo','round','ingA','ingB','budgetA','budgetB','side','sched',
     'banA','banB','pickA','pickB','guestA','guestB','pubBan','lockedOps','historyRounds','history','countdown','cdRemain','cdEnabled','cdPaused'].forEach(function(k){
      if(d[k]!==undefined)S[k]=d[k];
    });
    S.ops.forEach(function(o){o.status='avail'});
    S.lockedOps.forEach(function(o){var x=S.ops.find(function(v){return v.id===o.id});if(x)x.status='locked'});
    S.pubBan.forEach(function(o){var x=S.ops.find(function(v){return v.id===o.id});if(x)x.status='pubban'});
    S.banA.forEach(function(o){var x=S.ops.find(function(v){return v.id===o.id});if(x)x.status='ban'});
    S.banB.forEach(function(o){var x=S.ops.find(function(v){return v.id===o.id});if(x)x.status='ban'});
    S.pickA.forEach(function(o){var x=S.ops.find(function(v){return v.id===o.id});if(x)x.status='pa'});
    S.pickB.forEach(function(o){var x=S.ops.find(function(v){return v.id===o.id});if(x)x.status='pb'});
    S.guestA.forEach(function(o){var x=S.ops.find(function(v){return v.id===o.id});if(x)x.status='ga'});
    S.guestB.forEach(function(o){var x=S.ops.find(function(v){return v.id===o.id});if(x)x.status='gb'});
    S.curAct=S.side==='ab'?'ban_a':'ban_b';S.curCls='all';
    return true;
  }catch(e){localStorage.removeItem('ytb_bp');return false}
}
// === BO回合切换：确认弹窗 ===
function showRoundConfirm(){
  document.getElementById('cfrm-msg').textContent='第'+S.round+'轮BP已完成，是否进入第'+(S.round+1)+'轮？';
  document.getElementById('cfrm-y').onclick=function(){
    document.getElementById('cfrm').classList.remove('open');
    if(S.banA.length>=S.maxBan&&S.banB.length>=S.maxBan&&S.pickA.length>=S.maxPick&&S.pickB.length>=S.maxPick&&S.guestA.length>=S.maxGuest&&S.guestB.length>=S.maxGuest){
      completeRound()
    }else{toast('⏸BP未完成，继续操作')}
  };
  document.getElementById('cfrm-n').onclick=function(){
    document.getElementById('cfrm').classList.remove('open');
    toast('⏸已暂停，可以撤销调整后继续')
  };
  document.getElementById('cfrm').classList.add('open')
}
// === BO回合完成：锁定本回合所有干员，进入下一轮 ===
function completeRound(){
  var used=[].concat(S.banA,S.banB,S.pickA,S.pickB,S.guestA,S.guestB,S.pubBan);
  used.forEach(function(op){if(!S.lockedOps.find(function(v){return v.id===op.id}))S.lockedOps.push({...op})});
  S.historyRounds.push({round:S.round,banA:[...S.banA],banB:[...S.banB],pickA:[...S.pickA],pickB:[...S.pickB],guestA:[...S.guestA],guestB:[...S.guestB],pubBan:[...S.pubBan]});
  S.round++;S.banA=[];S.banB=[];S.pickA=[];S.pickB=[];S.guestA=[];S.guestB=[];S.pubBan=[];S.history=[];
  S.ops.forEach(function(o){o.status='avail'});
  S.lockedOps.forEach(function(op){var x=S.ops.find(function(o){return o.id===op.id});if(x)x.status='locked'});
  S.curAct=S.side==='ab'?'ban_a':'ban_b';
  saveState();render();toast('🎯第'+(S.round-1)+'轮结束·进入第'+S.round+'轮！')
}
function exportImage(){
  var W = 1920, H = 1080, padX = 30, padY = 30, allImgs = [], loaded = 0, bgImg = null;
  var hasBan = S.banA.length || S.banB.length;
  var hasPick = S.pickA.length || S.pickB.length;
  var hasGuest = S.guestA.length || S.guestB.length;
  var banSz = 115, pickW = 200, pickH = 400, guestSz = 140, gap = 10, labelH = 30, titleH = 135;
  var c = document.createElement('canvas');
  var imgCache = {};
  // 加载队伍头像
  var teamImgA = null, teamImgB = null, plImgA = null, plImgB = null;
  try{
    var taEl = document.getElementById('taAvatar');
    if(taEl && taEl.src && taEl.src.length>100){teamImgA=new Image();teamImgA.crossOrigin='anonymous';teamImgA.src=taEl.src}
    var tbEl = document.getElementById('tbAvatar');
    if(tbEl && tbEl.src && tbEl.src.length>100){teamImgB=new Image();teamImgB.crossOrigin='anonymous';teamImgB.src=tbEl.src}
    var plAEl = document.getElementById('taPlAvatar');
    if(plAEl && plAEl.src && plAEl.src.length>100){plImgA=new Image();plImgA.crossOrigin='anonymous';plImgA.src=plAEl.src}
    var plBEl = document.getElementById('tbPlAvatar');
    if(plBEl && plBEl.src && plBEl.src.length>100){plImgB=new Image();plImgB.crossOrigin='anonymous';plImgB.src=plBEl.src}
  }catch(e){}

  // 底图渲染：默认红→蓝渐变 + 可选的用户上传底图（淡化）
  function drawBackground(ctx){
    var g = ctx.createLinearGradient(0, 0, W, 0);
    g.addColorStop(0, '#FF3311');
    g.addColorStop(0.25, '#662233');
    g.addColorStop(0.5, '#333355');
    g.addColorStop(0.75, '#224477');
    g.addColorStop(1, '#2288FF');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(0,0,0,0.08)'; ctx.fillRect(0, 0, W, H);
    if(bgImg){ ctx.save(); ctx.globalAlpha = 0.40; ctx.drawImage(bgImg, 0, 0, W, H); ctx.restore(); }
  }

  // 内容绘制
  function drawContent(ctx){
    ctx.textBaseline = 'top';
    var boText = S.bo>1 ? 'BO'+S.bo+' 第'+S.round+'轮' : 'BO1';
    // A队 左侧
    ctx.textAlign = 'left';
    // 队伍头像
    if(teamImgA && teamImgA.complete && teamImgA.naturalWidth>0){
      ctx.save(); ctx.beginPath(); ctx.arc(padX+26, padY+26, 26, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(teamImgA, padX, padY, 52, 52); ctx.restore();
    }else{
      ctx.beginPath(); ctx.arc(padX+26, padY+26, 26, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,51,17,0.15)'; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(padX+26, padY+26, 26, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,51,17,0.3)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#FF5522'; ctx.font = 'bold 38px "Microsoft YaHei",sans-serif';
    ctx.fillText(S.teamA.name, padX+90, padY+4);
    ctx.fillStyle = '#D4A854'; ctx.font = '30px "Microsoft YaHei",sans-serif';
    if(plImgA&&plImgA.complete&&plImgA.naturalWidth>0){
      ctx.save(); ctx.beginPath(); ctx.arc(padX+90, padY+53, 18, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(plImgA, padX+72, padY+35, 36, 36); ctx.restore();
      ctx.fillText(S.teamA.player, padX+114, padY+44);
    }else{
      ctx.fillText(S.teamA.player, padX+90, padY+46);
    }
    // B队 右侧
    ctx.textAlign = 'right';
    if(teamImgB && teamImgB.complete && teamImgB.naturalWidth>0){
      ctx.save(); ctx.beginPath(); ctx.arc(W-padX-26, padY+26, 26, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(teamImgB, W-padX-52, padY, 52, 52); ctx.restore();
    }else{
      ctx.beginPath(); ctx.arc(W-padX-26, padY+26, 26, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(34,136,255,0.15)'; ctx.fill();
    }
    ctx.beginPath(); ctx.arc(W-padX-26, padY+26, 26, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(34,136,255,0.3)'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#2288FF'; ctx.font = 'bold 38px "Microsoft YaHei",sans-serif';
    ctx.fillText(S.teamB.name, W-padX-90, padY+4);
    ctx.fillStyle = '#D4A854'; ctx.font = '30px "Microsoft YaHei",sans-serif';
    if(plImgB&&plImgB.complete&&plImgB.naturalWidth>0){
      ctx.save(); ctx.beginPath(); ctx.arc(W-padX-112, padY+53, 18, 0, Math.PI*2); ctx.clip();
      ctx.drawImage(plImgB, W-padX-130, padY+35, 36, 36); ctx.restore();
      ctx.fillText(S.teamB.player, W-padX-90, padY+44);
    }else{
      ctx.fillText(S.teamB.player, W-padX-90, padY+46);
    }
    // 中标题
    ctx.textAlign = 'center';
    ctx.fillStyle = '#FFE88A'; ctx.font = 'bold 42px "Microsoft YaHei",sans-serif';
    ctx.fillText('🏆应天杯 · '+boText+' · BP定阵', W/2, padY+16);
    ctx.fillStyle = '#A09080'; ctx.font = '18px "Microsoft YaHei",sans-serif';
    ctx.fillText('「萨卡兹的无终奇语」 '+(S.side==='ab'?'🔴A先手':'🔵B先手'), W/2, padY+78);
    var sepY = padY + titleH;
    ctx.strokeStyle = 'rgba(212,168,84,0.2)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(padX+20, sepY); ctx.lineTo(W-padX-20, sepY); ctx.stroke();
    var curY = sepY + 32;
    // === 禁用+外援 同一行（A从左→中间，B从右→中间，对称）===
    if(hasBan || hasGuest){
      // A队 左→右（朝向中间）
      ctx.textAlign = 'left';
      var aLx = padX + 20;
      ctx.fillStyle = '#FF3B3B'; ctx.font = 'bold 18px "Microsoft YaHei",sans-serif';
      ctx.fillText('⛔禁用', aLx, curY);
      aLx += 70;
      S.banA.forEach(function(op,i){ placeHead(ctx, aLx+(banSz+gap)*i, curY+labelH+4, banSz, op, '#FF3B3B'); });
      aLx += Math.max(1, S.banA.length) * (banSz + gap);
      if(S.guestA.length){
        aLx += 16;
        ctx.fillStyle = '#D4A854'; ctx.font = 'bold 18px "Microsoft YaHei",sans-serif';
        ctx.fillText('🔄外援', aLx, curY);
        aLx += 70;
        S.guestA.forEach(function(op,i){ placeHead(ctx, aLx+(guestSz+gap)*i, curY+labelH+4, guestSz, op, '#D4A854'); });
      }
      // B队 右→左（朝向中间，对称）
      ctx.textAlign = 'right';
      var bRx = W - padX - 20;
      ctx.fillStyle = '#FF3B3B'; ctx.font = 'bold 18px "Microsoft YaHei",sans-serif';
      ctx.fillText('⛔禁用', bRx, curY);
      bRx -= 70;
      S.banB.forEach(function(op,i){ placeHead(ctx, bRx-(banSz+gap)*i-banSz, curY+labelH+4, banSz, op, '#FF3B3B'); });
      bRx -= Math.max(1, S.banB.length) * (banSz + gap);
      if(S.guestB.length){
        bRx -= 16;
        ctx.fillStyle = '#D4A854'; ctx.font = 'bold 18px "Microsoft YaHei",sans-serif';
        ctx.fillText('🔄外援', bRx, curY);
        bRx -= 70;
        S.guestB.forEach(function(op,i){ placeHead(ctx, bRx-(guestSz+gap)*i-guestSz, curY+labelH+4, guestSz, op, '#D4A854'); });
      }
      curY += labelH + Math.max(banSz, guestSz) + 18;
    }
    // === 选取（单行，3-5人自动间距，以四分位点为中心；5人以上缩小尺寸）===
    if(hasPick){
      curY += 28;
      var centerMax = Math.max(S.pickA.length, S.pickB.length);
      // 5人以上缩小图片尺寸和间距
      var pW = pickW, pH = pickH;
      if(centerMax >= 5){ pW = 160; pH = 320; }
      var autoGap = Math.max(4, Math.floor(centerMax >= 5 ? 80 / centerMax : 130 / centerMax));
      // A队 以左四分位点为中心
      var aCenterX = W * 0.25;
      var aCnt = S.pickA.length, aTotal = aCnt * pW + (aCnt-1) * autoGap;
      var aStartX = aCenterX - aTotal/2;
      ctx.textAlign = 'left';
      ctx.fillStyle = '#FF5522'; ctx.font = 'bold 18px "Microsoft YaHei",sans-serif';
      ctx.fillText('⭐选取', padX+20, curY);
      S.pickA.forEach(function(op,i){
        placePick(ctx, aStartX + i*(pW+autoGap), curY+labelH+6, pW, pH, op, '#FF5522');
      });
      // B队 以右四分位点为中心（对称镜像）
      var bCenterX = W * 0.75;
      var bCnt = S.pickB.length, bTotal = bCnt * pW + (bCnt-1) * autoGap;
      var bStartX = bCenterX - bTotal/2;
      ctx.textAlign = 'right';
      ctx.fillStyle = '#2288FF'; ctx.font = 'bold 18px "Microsoft YaHei",sans-serif';
      ctx.fillText('⭐选取', W-padX-20, curY);
      S.pickB.forEach(function(op,i){
        placePick(ctx, bStartX + (bCnt-1-i)*(pW+autoGap), curY+labelH+6, pW, pH, op, '#2288FF');
      });
      curY += labelH + pH + 30;
    }
    // === 底部信息 ===
    curY += 22;
    ctx.strokeStyle = 'rgba(212,168,84,0.15)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(padX+80, curY); ctx.lineTo(W-padX-80, curY); ctx.stroke();
    curY += 14;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#A09080'; ctx.font = '17px "Microsoft YaHei",sans-serif';
    ctx.fillText('📅 '+S.sched+'  |  '+boText+'  |  '+(S.side==='ab'?'🔴A队先手':'🔵B队先手')+'  |  ⛔'+S.maxBan+'禁  ⭐'+S.maxPick+'选  🔄'+S.maxGuest+'援', W/2, curY);
  }

  function placeHead(ctx, x, y, sz, op, color){
    var img = imgCache[iuHead(op)] || (imgCache[iuHead(op)] = new Image());
    img.crossOrigin = 'anonymous';
    allImgs.push(img);
    (function(x2,y2,m){
      m.onload=function(){
        ctx.save(); ctx.beginPath(); ctx.arc(x2+sz/2,y2+sz/2,sz/2,0,Math.PI*2); ctx.clip();
        ctx.drawImage(m,x2,y2,sz,sz); ctx.restore();
        ctx.beginPath(); ctx.arc(x2+sz/2,y2+sz/2,sz/2,0,Math.PI*2);
        ctx.strokeStyle=color; ctx.lineWidth=2; ctx.stroke();
        if(++loaded>=allImgs.length)showPreview();
      };
      m.onerror=function(){if(++loaded>=allImgs.length)showPreview()};
      if(!m._src){ m._src=1; m.src=iuHead(op); }
    })(x,y,img);
  }

  function placePick(ctx, x, y, w, h, op, color){
    var img = imgCache[iu(op)] || (imgCache[iu(op)] = new Image());
    img.crossOrigin = 'anonymous';
    allImgs.push(img);
    (function(x2,y2,m){
      m.onload=function(){
        ctx.save(); ctx.beginPath();
        if(ctx.roundRect)ctx.roundRect(x2,y2,w,h,4);else ctx.rect(x2,y2,w,h);
        ctx.clip(); ctx.drawImage(m,x2,y2,w,h); ctx.restore();
        ctx.strokeStyle=color; ctx.lineWidth=1.5; ctx.save(); ctx.beginPath();
        if(ctx.roundRect)ctx.roundRect(x2,y2,w,h,6);else ctx.rect(x2,y2,w,h);
        ctx.stroke(); ctx.restore();
        if(++loaded>=allImgs.length)showPreview();
      };
      m.onerror=function(){if(++loaded>=allImgs.length)showPreview()};
      if(!m._src){ m._src=1; m.src=iu(op); }
    })(x,y,img);
  }


  // 初次渲染
  c.width=W; c.height=H;
  var ctx = c.getContext('2d');
  drawBackground(ctx);
  drawContent(ctx);

  function showPreview(){
    var pm = document.getElementById('previewModal'), pc;
    if(!pm){
      pm = document.createElement('div'); pm.id = 'previewModal';
      pm.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.85);display:flex;flex-direction:column;align-items:center;justify-content:center';
      var box = document.createElement('div');
      box.style.cssText = 'position:relative;max-width:92vw;max-height:72vh;overflow:auto;border-radius:8px;background:transparent';
      pc = document.createElement('canvas'); pc.id = 'previewCanvas';
      pc.style.cssText = 'width:100%;display:block';
      box.appendChild(pc); pm.appendChild(box);
      var acts = document.createElement('div');
      acts.style.cssText = 'display:flex;gap:12px;margin-top:14px;align-items:center;flex-wrap:wrap;justify-content:center';
      // 底图上传
      var bgBtn = document.createElement('button');
      bgBtn.textContent = '🖼上传底图';
      bgBtn.style.cssText = 'padding:8px 16px;border:1px solid rgba(255,255,255,.15);border-radius:5px;background:rgba(0,0,0,.5);color:#A09080;font-size:12px;cursor:pointer';
      var bgInp = document.createElement('input');
      bgInp.type = 'file'; bgInp.accept = 'image/*';
      bgInp.style.display = 'none';
      bgBtn.onclick = function(){ bgInp.click(); };
      bgInp.onchange = function(){
        var f = bgInp.files[0]; if(!f) return;
        var r = new FileReader();
        r.onload = function(e){
          var im = new Image();
          im.crossOrigin = 'anonymous';
          im.onload = function(){
            bgImg = im;
            // 重新渲染
            loaded = 0; allImgs = []; imgCache = {};
            c.width = W; c.height = H;
            var ctx2 = c.getContext('2d');
            drawBackground(ctx2);
            drawContent(ctx2);
          };
          im.src = e.target.result;
        };
        r.readAsDataURL(f);
        bgInp.value = '';
      };
      acts.appendChild(bgBtn); acts.appendChild(bgInp);
      var btnC = document.createElement('button');
      btnC.textContent = '✓ 确认生成';
      btnC.style.cssText = 'padding:10px 30px;border:none;border-radius:6px;background:linear-gradient(135deg,#D4A854,#CC3333);color:#fff;font-size:15px;font-weight:700;cursor:pointer';
      var btnX = document.createElement('button');
      btnX.textContent = '✕ 取消';
      btnX.style.cssText = 'padding:10px 30px;border:1px solid rgba(255,255,255,.15);border-radius:6px;background:rgba(0,0,0,.5);color:#A09080;font-size:15px;font-weight:700;cursor:pointer';
      btnC.onclick = function(){
        document.body.removeChild(pm);
        var lnk = document.createElement('a'); lnk.download = '应天杯_BP_'+S.sched+'.png';
        lnk.href = c.toDataURL('image/png'); lnk.click(); toast('✅图片已导出');
      };
      btnX.onclick = function(){ document.body.removeChild(pm); };
      acts.appendChild(btnC); acts.appendChild(btnX); pm.appendChild(acts);
      document.body.appendChild(pm);
    }
    pc = document.getElementById('previewCanvas');
    pc.width = W; pc.height = H;
    var pctx = pc.getContext('2d');
    pctx.drawImage(c, 0, 0);
    var maxW = window.innerWidth*0.9, maxH = window.innerHeight*0.68;
    var scale = Math.min(1, maxW/W, maxH/H);
    pc.style.width = (W*scale)+'px'; pc.style.height = (H*scale)+'px';
  }
}
function mkParticles(){var c=document.getElementById('particles');for(var i=0;i<30;i++){var p=document.createElement('div');p.className='p';p.style.left=Math.random()*100+'%';p.style.width=p.style.height=(1+Math.random()*2.5)+'px';p.style.animationDuration=(15+Math.random()*30)+'s';p.style.animationDelay=(Math.random()*20)+'s';p.style.opacity=.08+Math.random()*.25;c.appendChild(p)}}
if(!loadState()){init()}
render();mkParticles();
// 倒计时实时更新（每秒）
setInterval(function(){
  var cdEl=document.getElementById('cdDisplay');
  if(!cdEl||!S.cdEnabled||!S.countdown||S.countdown<=0){if(cdEl)cdEl.style.display='none';return}
  if(!S.cdPaused&&S.cdRemain>0){S.cdRemain--}
  cdEl.textContent='倒计时:'+Math.max(0,S.cdRemain||0)+'s'+(S.cdPaused?'⏸':'');
  cdEl.style.color=(S.cdRemain||0)<=0?'var(--ban-color)':'var(--gold-bright)';
}, 1000);
console.log('🏆应天杯已加载，共'+OPERATORS.length+'位干员');
</script>
</body>
